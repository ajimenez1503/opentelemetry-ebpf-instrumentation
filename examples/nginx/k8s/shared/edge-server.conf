server {
    listen 8080;
    server_name _;

    location = /users/42/home {
        return 200 "user home page\n";
    }

    location = /campaigns/spring-2026/redirect {
        return 302 /users/42/home;
    }

    location = /support/articles/984404 {
        return 404 "support article missing\n";
    }

    location = /checkout/sessions/abc123xyz {
        return 500 "checkout failure\n";
    }

    location = /api/users/42/recommendations/v1/homepage-hero {
        proxy_pass http://recommendations_v1_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/users/314159/recommendations/v1/category-bundles {
        proxy_pass http://recommendations_v1_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/users/271828/recommendations/v2/style-refresh {
        proxy_pass http://recommendations_v2_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/users/42/recommendations/rollout/personalized-homepage {
        proxy_pass http://recommendations_v2_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/users/9001/recommendations/rollout/cart-recovery {
        proxy_pass http://recommendations_v2_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
