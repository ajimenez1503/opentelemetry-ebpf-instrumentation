apiVersion: v1
kind: Service
metadata:
  name: edge-nginx
  namespace: obi-nginx-example
spec:
  selector:
    app: edge-nginx
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: edge-nginx
  namespace: obi-nginx-example
spec:
  replicas: 1
  selector:
    matchLabels:
      app: edge-nginx
  template:
    metadata:
      labels:
        app: edge-nginx
    spec:
      containers:
        - name: nginx
          image: nginx:1.27.5-alpine@sha256:65645c7bb6a0661892a8b03b89d0743208a18dd2f3f17a54ef4b76fb8e2f2a10
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: shared
              mountPath: /etc/nginx/shared
      volumes:
        - name: config
          configMap:
            name: edge-nginx-config
        - name: shared
          configMap:
            name: nginx-shared-config
---
