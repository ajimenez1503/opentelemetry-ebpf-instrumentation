apiVersion: apps/v1
kind: Deployment
metadata:
  name: traffic-generator
  namespace: obi-nginx-example
spec:
  replicas: 1
  selector:
    matchLabels:
      app: traffic-generator
  template:
    metadata:
      labels:
        app: traffic-generator
    spec:
      containers:
        - name: traffic-generator
          image: obi-nginx-traffic:local
          imagePullPolicy: IfNotPresent
          args:
            - --base-url
            - http://edge-nginx:8080
            - --progress-seconds
            - "15"
