routes:
  unmatched: path
attributes:
  select:
    traces:
      include:
      - gen_ai.input.messages
      - gen_ai.system_instructions
      - gen_ai.output.messages
      - gen_ai.metadata
ebpf:
  buffer_sizes:
    http: 8192
  protocol_debug_print: true
  payload_extraction:
    http:
      openai:
        enabled: true
trace_printer: text
discovery:
  exclude_otel_instrumented_services: false
