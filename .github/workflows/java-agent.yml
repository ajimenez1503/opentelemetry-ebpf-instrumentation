name: Java Agent CI

on:
  push:
    branches: ["main", "release-*"]
  pull_request:
    branches: ["main", "release-*"]
    paths:
      - "pkg/internal/java/**"
      - ".github/workflows/java-agent.yml"
  workflow_dispatch:
  workflow_call:
    inputs:
      ref:
        description: "Git ref (commit, branch, or tag) to check out"
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    working-directory: pkg/internal/java

jobs:
  build:
    name: Build and test (Java ${{ matrix.test-java }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        test-java: [8, 11, 17, 21]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - name: Set up JDK ${{ matrix.test-java }} for testing
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: ${{ matrix.test-java }}

      - name: Set up JDK for running Gradle
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version-file: pkg/internal/java/.java-version

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2
        with:
          cache-disabled: true

      - name: Check code formatting (Spotless)
        run: ./gradlew spotlessCheck --no-daemon --stacktrace

      - name: Build agent
        run: ./gradlew build --no-daemon --stacktrace

      - name: Upload build artifacts
        if: matrix.test-java == 21
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: obi-java-agent
          path: pkg/internal/java/build/obi-java-agent.jar
          retention-days: 7
